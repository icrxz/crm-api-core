repos:
  # 1. Limpeza básica de texto
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # 2. Formatação automática Go
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt      # Formata o código (espaços, quebras de linha)
      - id: go-imports  # Adiciona imports ausentes e remove os não utilizados

  # 3. Linter Oficial (golangci-lint v2)
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.2
    hooks:
      - id: golangci-lint
