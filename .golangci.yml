version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  # Substitui o antigo disable-all: true
  default: none

  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - nilerr
    - revive

  # O antigo 'linters-settings' foi encapsulado aqui
  settings:
    gocyclo:
      min-complexity: 15
    goconst:
      min-len: 3
      min-occurrences: 3
    misspell:
      locale: US

issues:
  max-same-issues: 0
