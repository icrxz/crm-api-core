services:
  db:
    image: postgres:16-alpine
    container_name: postgres-database
    restart: always
    env_file:
      - .env.local
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm-core"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  app:
    container_name: crm-app
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crm-network
    command: air ./cmd/main.go -b 0.0.0.0

volumes:
  pg_data:

networks:
  crm-network:
    driver: bridge
